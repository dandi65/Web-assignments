<!DOCTYPE html>
<html>
<head>
    <title>CSS Dynamic Pseudo-Class Quiz</title>

    <style>
        .linkone:link,
        .linkone:visited {
            color: green;
        }

        .linkone:hover,
        .linkone:active {
            color: brown;
            font-size: 40px;
        }
    </style>
</head>

<body>

    <h1>Css Example</h1>

    <p>
        This is the first paragraph
        <a href="https://www.google.com" class="linkone">Link one</a>
    </p>

    <p>
        This is the third paragraph
        <a href="https://www.youtube.com">Link Two</a>
    </p>

    <p>
        This is the third paragraph
        <a href="https://www.facebook.com">Link Three</a>
    </p>

</body>
</html>
