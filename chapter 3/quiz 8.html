    <title>After Content Attr Quiz</title>

    <style>
        a:after {
            content: " [" attr(href) "]";
        }
    </style>
</head>

        <p>This is an example paragraph <a href="#four">Link four</a></p>
        <p>This is an example paragraph <a href="#five">Link five</a></p>
        <p>This is an example paragraph <a href="#six">Link six</a></p>
        <p>This is an example paragraph <a href="#seven">Link seven</a></p>
    </div>

</body>
</html>
