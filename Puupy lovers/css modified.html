<!DOCTYPE html>
<html>
<head>
    <title>Puppy Lovers Page</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: white;
            font-family: Arial, Helvetica, sans-serif;
        }

        header {
            background-color: blue;
            color: white;
            text-align: center;
            padding: 20px;
        }

        header h1 {
            margin: 0;
            font-size: 36px;
        }

        .banner {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .puppy-section {
            text-align: center;
            margin: 40px auto;
            max-width: 900px;
        }

        .puppy-box {
            display: inline-block;
            width: 150px;
            height: 150px;
            margin: 20px;
            vertical-align: top;
        }

        .puppy-box img {
            width: 150px;
            height: 150px;
            border-radius: 10px;
        }

        .missing-box {
            background-color: hotpink;
            color: black;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            padding-top: 25px;
            box-sizing: border-box;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
            font-size: 32px;
            color: black;
        }

        .more-puppies {
            text-align: center;
            margin: 30px auto;
        }

        .more-puppies img {
            width: 250px;
            height: 300px;
            margin: 25px;
            border-radius: 15px;
        }

        footer {
            background-color: blue;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }

        footer h2 {
            color: white;
            font-size: 26px;
            margin: 0;
        }
    </style>
</head>

<body>

    <header>
        <h1>Puppy lovers page</h1>
    </header>

    <img class="banner" src="banner-puppies.jpg" alt="puppy banner">

    <section class="puppy-section">
        <div class="puppy-box">
            <img src="puppy-1.jpg" alt="puppy one">
        </div>

        <div class="puppy-box missing-box">
            Puppy<br>missing<br>here!!
        </div>

        <div class="puppy-box">
            <img src="puppy-2.jpg" alt="puppy two">
        </div>
    </section>

    <h2>More Puppies</h2>

    <section class="more-puppies">
        <img src="puppy-3.jpg" alt="puppy three">
        <img src="puppy-4.jpg" alt="puppy four">
    </section>

    <footer>
        <h2>Developed by: Dandi Biratu Yigezu</h2>
    </footer>

</body>
</html>
